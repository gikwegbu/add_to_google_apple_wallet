# fly.toml app configuration file generated for wallet-core on 2026-03-04T14:19:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wallet-core'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
